$schema: "normative_rules_schema.json#"

# All of these normative curations are to table cells in the ISA manual instruction
# encoding tables and so there isn't any associated text with the normative rule.
# These curations are still useful since there is still an AsciiDoc anchor in the table cell
# and so it can be a hyperlink target in PDF/HTML files.
