$schema: "normative_rules_schema.json#"

normative_curations:
  - name: rv32_xregwidth # Normative rule names are more compact than tag names
    type: base
    summary: RV32I XLEN # Few word summary of normative rule.
    tags: ["norm:base:rv32i:xregwidth"]
  - name: rv32i_other_xregs
    type: base
    summary: Registers x1 to x31
    tags: ["norm:bases:rv32i_rv64i:other-xregs"] # Same tag used in rv64.yaml (that chapter is written as deltas from this chapter)
  - name: pcreg
    type: base
    description: | # Example where augmenting information in tags helps better define a normative rule
        The `pc` contains a byte address so is incremented by 4 for 32-bit instructions and 
        2 for 16-bit instructions.
    tags: ["norm:basegrp:all:pcreg"]
  - names: [slti_op,sltiu_op] # Example of multiple normative rules using the same tag
    type: instruction
    tags: ["norm:insts:slti_sltiu:operation"]
  - name: x0eq0
    type: base
    summary: Register x0 always zero
    tags: ["norm:basegrp:all:x0eq0"]
  - name: taken_cti_misaligned_exc
    type: instruction
    summary: CTI misaligned execution
    tags: ["norm:instgrp:taken_cti:ia_misaligned_exc"]
  - name: cond_br_no_ia_misaligned_exc_not_taken
    type: instruction
    summary: No IA misaligned exc on not taken
    tags: ["norm:instgrp:cond_branch:no_ia_misaligned_exc_not_taken"]
  - name: imm_always_sex
    type: instruction
    summary: Immediates always sign-extended
    tags: ["norm:basegrp:all:imm_always_sex"]
  - name: addi_op
    type: instruction
    tags: ["norm:inst:addi:operation"]
  - name: addi_overflow
    type: instruction
    summary: Treatment of overflow
    tags: ["norm:inst:addi:overflow"]
  - names: [andi_op,ori_op,xori_op]
    type: instruction
    tags: ["norm:insts:andi_ori_xori:operation"]

